name: Daily prices fetch

on:
  schedule:
    # Daily at 06:30 UTC — DGEG site updates throughout the day; this catches
    # the previous day's tail without hitting the morning rush.
    - cron: "30 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - run: pip install -r scripts/requirements.txt

      - name: Fetch fresh prices
        run: python scripts/fetch_prices.py

      - name: Commit if changed
        run: |
          git config user.name "prices-bot"
          git config user.email "prices-bot@users.noreply.github.com"
          if ! git diff --quiet -- data/stations.json; then
            git add data/stations.json
            git commit -m "data: refresh prices for $(date -u +%Y-%m-%d)"
            git push
          else
            echo "No changes."
          fi
